<!DOCTYPE html>

  <head>

    <meta name="author" content="Datacendia" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://datacendia.com/" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0a0a" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://datacendia.com/" />

    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://datacendia.com/" />
    <meta name="twitter:title" content="Datacendia - Enterprise Intelligence Platform" />

    <meta name="twitter:image" content="https://datacendia.com/og-image.svg" />
    <meta name="twitter:creator" content="@datacendia" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Datacendia",
      "description": "Enterprise Intelligence Platform - AI-powered decision intelligence, predictive analytics, and automated workflows.",
      "url": "https://datacendia.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier available"
      },
      "creator": {
        "@type": "Organization",
        "name": "Datacendia",
        "url": "https://datacendia.com"
      },
      "featureList": [
        "AI Decision Intelligence",
        "Real-time Analytics",
        "Knowledge Graph",
        "Predictive Analytics",
        "Workflow Automation"
      ]
    }
    </script>

    <!-- Fonts - Optimized loading with font-display: swap already in URL -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the font CSS to reduce render blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>

      </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
