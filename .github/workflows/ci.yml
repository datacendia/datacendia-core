# =============================================================================
# DATACENDIA CORE — CI PIPELINE
# Type-check, lint, test, and build verification on every push/PR
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # FRONTEND: Type Check, Lint, Build
  # ===========================================================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx vite build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

  # ===========================================================================
  # BACKEND: Type Check, Lint, Unit Tests, Build
  # ===========================================================================
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: datacendia
          POSTGRES_PASSWORD: datacendia_test
          POSTGRES_DB: datacendia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datacendia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install system build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://datacendia:datacendia_test@localhost:5432/datacendia_test

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Run unit tests (exclude e2e/integration)
        working-directory: backend
        run: |
          npx vitest run \
            --exclude="**/e2e/**" \
            --exclude="**/integration/**" \
            --exclude="**/e2e.test.*" \
            --exclude="**/comprehensive.test.*"
        env:
          CI: true
          DATABASE_URL: postgresql://datacendia:datacendia_test@localhost:5432/datacendia_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          NODE_ENV: test

      - name: Run infrastructure service tests
        working-directory: backend
        run: npx vitest run src/__tests__/infrastructure/ --reporter=verbose
        env:
          CI: true
          NODE_ENV: test

  # ===========================================================================
  # COMMUNITY BUILD: Boundary Check + Community tsc
  # ===========================================================================
  community-build:
    name: Community Edition Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check community/enterprise boundary
        run: node scripts/check-community-boundary.mjs

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Build community edition
        working-directory: backend
        run: npx tsc -p tsconfig.community.json

  # ===========================================================================
  # STATUS CHECK — Required for branch protection
  # ===========================================================================
  ci-status:
    name: CI Status
    if: always()
    needs: [frontend, backend, community-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "Frontend:        ${{ needs.frontend.result }}"
          echo "Backend:         ${{ needs.backend.result }}"
          echo "Community Build: ${{ needs.community-build.result }}"
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.backend.result }}" == "failure" || "${{ needs.community-build.result }}" == "failure" ]]; then
            echo "::error::CI failed — see individual job logs above"
            exit 1
          fi
          echo "All CI checks passed"
